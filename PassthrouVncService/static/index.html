<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VNC Passthrough</title>
  <link href="/static/bootstrap/bootstrap.min.css" rel="stylesheet">
  <script src="/static/bootstrap/bootstrap.bundle.min.js"></script>
  <style>
    body, html { height: 100%; }
    .centered { min-height: 100%; display:flex; align-items:center; justify-content:center; background-color:#f8f9fa; }
    .card { width: 100%; max-width: 420px; }
  </style>
</head>
<body>
  <div class="centered">
    <div class="card shadow-sm">
      <div class="card-body">
        <h4 class="card-title text-center mb-3">VNC Passthrough</h4>
        <p class="text-muted small text-center">
          IP address or hostname of the VNC server you want to connect to. The connection will be established on port 5900.
        </p>
        <form method="get" action="/connect">
          <div class="mb-3">
            <label class="form-label">VNC Server IP or Hostname</label>
            <input name="host" class="form-control" placeholder="e.g., 192.168.1.10" required />
          </div>
          <div class="d-grid gap-2">
            <button type="submit" class="btn btn-primary">Connect</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
